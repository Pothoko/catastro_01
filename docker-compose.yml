# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Catastro Municipal Vallegrande
# Imagen custom: ghcr.io/pothoko/catastro_01:latest (construida por CI/CD)
# ─────────────────────────────────────────────────────────────────────────────
# DESARROLLO LOCAL: los addons se montan como volumen (override del Dockerfile)
# PRODUCCIÓN (WSL catastro): usar /opt/catastro/docker-compose.yml sin el mount
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo_secret
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  odoo:
    # ── Imagen custom desde GitHub Container Registry ─────────────────────────
    build: .
    image: ghcr.io/pothoko/catastro_01:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_secret
    volumes:
      - odoo-web-data:/var/lib/odoo
      # Desarrollo local: mount de addons (override de los del Dockerfile)
      # Comentar este volumen en producción para usar los addons de la imagen
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    restart: always
    expose:
      - "8069"
      - "8072"
    networks:
      - default
      - web-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web-proxy"
      - "traefik.http.middlewares.odoo-catastro-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.odoo-catastro.rule=Host(`catastro.local`)"
      - "traefik.http.routers.odoo-catastro.entrypoints=web"
      - "traefik.http.routers.odoo-catastro.service=odoo-catastro-svc"
      - "traefik.http.routers.odoo-catastro.middlewares=odoo-catastro-headers"
      - "traefik.http.services.odoo-catastro-svc.loadbalancer.server.port=8069"
      - "traefik.http.routers.odoo-catastro-ws.rule=Host(`catastro.local`) && PathPrefix(`/websocket`)"
      - "traefik.http.routers.odoo-catastro-ws.entrypoints=web"
      - "traefik.http.routers.odoo-catastro-ws.service=odoo-catastro-ws-svc"
      - "traefik.http.routers.odoo-catastro-ws.middlewares=odoo-catastro-headers"
      - "traefik.http.services.odoo-catastro-ws-svc.loadbalancer.server.port=8072"
  qgis-server:
    image: camptocamp/qgis-server:latest
    environment:
      - QGIS_PROJECT_FILE=/data/workspace.qgz
      - QGIS_SERVER_LOG_LEVEL=1
    volumes:
      - ./qgis_data:/data
    restart: always
    expose:
      - "80"
    networks:
      - default
      - web-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web-proxy"
      - "traefik.http.routers.qgis-server.rule=Host(`catastro.local`) && PathPrefix(`/qgisserver`)"
      - "traefik.http.routers.qgis-server.entrypoints=web"
      - "traefik.http.routers.qgis-server.service=qgis-server-svc"
      - "traefik.http.services.qgis-server-svc.loadbalancer.server.port=80"
      - "traefik.http.middlewares.qgis-strip.stripprefix.prefixes=/qgisserver"
      - "traefik.http.routers.qgis-server.middlewares=qgis-strip"

  traefik:
    image: traefik:latest
    container_name: traefik-catastro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.odoo-compress.compress=true"
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data:

networks:
  web-proxy:
    external: true
