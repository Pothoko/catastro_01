# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml — Ambiente de DESARROLLO LOCAL (Kali Linux)
# Uso:  docker compose -f docker-compose.dev.yml up -d --build
#       (NO necesita docker-compose.yml base)
#
# Diferencias vs producción (WSL catastro):
#   - Construye imagen desde Dockerfile local (no usa GHCR)
#   - Expone puerto 8069 directamente (sin Traefik)
#   - Monta addons desde ./addons para hot-reload
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo_secret
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: catastro-dev:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_secret
    volumes:
      - odoo-web-dev:/var/lib/odoo
      - ./addons:/mnt/extra-addons      # hot-reload de módulos
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    restart: unless-stopped

  qgis-server:
    image: camptocamp/qgis-server:3.28
    environment:
      - QGIS_PROJECT_FILE=/io/data/workspace.qgz
      - QGIS_SERVER_LOG_LEVEL=0
    volumes:
      - ./qgis_data:/io/data
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  odoo-db-dev:
  odoo-web-dev:
